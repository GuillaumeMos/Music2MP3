name: Tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python 3.14 / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Prepare Qt runtime
        run: python devtools/prepare_qt_runtime.py

      - name: Compile Python sources
        run: python -m compileall -q -x '(^|[\\/])(\.venv|venv|build|dist)([\\/]|$)' .

      - name: Run offline test suite
        run: python -m unittest discover -s tests -v
